<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AO Heatmap Generator</title>
  <style>
    :root{
      --bg:#0b1220;
      --panel:#101a30;
      --text:#e8eefc;
      --muted:#a9b6d6;
      --line:#2a3a63;

      /* Level colors (requested) */
      --l1:#a8e6a3; /* green */
      --l2:#f7e49c; /* yellow */
      --l3:#f5a3a3; /* red */

      --blueRow:#183a7a;
    }

    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: linear-gradient(180deg, #071022 0%, #0b1220 60%, #060b17 100%);
      color:var(--text);
      padding:18px;
    }

    h1{ margin:0 0 10px 0; font-size:22px; }
    h2{ margin:0 0 10px 0; font-size:16px; color:var(--muted); font-weight:600; }
    .row{ display:flex; gap:14px; flex-wrap:wrap; }
    .card{
      background: rgba(16,26,48,0.9);
      border:1px solid rgba(42,58,99,0.8);
      border-radius:14px;
      padding:14px;
      box-shadow: 0 8px 28px rgba(0,0,0,0.35);
    }
    .card.wide{ width:100%; }
    .card.left{ flex: 1 1 420px; min-width:360px; }
    .card.right{ flex: 1 1 520px; min-width:360px; }

    label{ font-size:12px; color:var(--muted); display:block; margin-bottom:6px; }
    input, select, textarea{
      width:100%;
      background:#0b1430;
      border:1px solid rgba(42,58,99,0.9);
      color:var(--text);
      border-radius:10px;
      padding:10px 10px;
      outline:none;
    }
    textarea{ min-height:64px; resize:vertical; }

    .grid{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:10px;
    }
    .grid3{
      display:grid;
      grid-template-columns: 0.6fr 0.8fr 2fr;
      gap:10px;
      align-items:end;
    }
    .grid2{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:10px;
      align-items:end;
    }

    .btn{
      background:#132044;
      border:1px solid rgba(42,58,99,0.9);
      color:var(--text);
      padding:10px 12px;
      border-radius:10px;
      cursor:pointer;
      font-weight:700;
      user-select:none;
    }
    .btn:hover{ filter:brightness(1.08); }
    .btn.primary{ background:#1c2f66; }
    .btn.danger{ background:#4a1e2a; border-color:#7a2d3f; }
    .btn.small{ padding:7px 10px; font-size:12px; border-radius:9px; }
    .btn.pill{ border-radius:999px; padding:8px 12px; font-size:12px; }

    /* Level-colored buttons (override base button bg) */
    .btn.pill.lvl1{ background: var(--l1) !important; color:#111; }
    .btn.pill.lvl2{ background: var(--l2) !important; color:#111; }
    .btn.pill.lvl3{ background: var(--l3) !important; color:#111; }

    .inline{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
    }
    .check{
      display:flex;
      align-items:center;
      gap:8px;
      font-size:12px;
      color:var(--muted);
      user-select:none;
    }
    .check input{ width:auto; }

    .muted{ color:var(--muted); font-size:12px; }

    /* Heatmap tables */
    table{ border-collapse:collapse; width:100%; }
    th, td{
      border:1px solid rgba(42,58,99,0.9);
      padding:8px;
      text-align:center;
      font-size:12px;
    }
