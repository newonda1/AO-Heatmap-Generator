<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AO Heatmap Generator</title>

<style>

body{
font-family:Arial, Helvetica, sans-serif;
background:#0f1b2d;
color:#e5ecf5;
margin:0;
padding:30px;
}

h2{
margin-top:0;
}

.container{
display:grid;
grid-template-columns:1fr 1fr;
gap:30px;
}

.panel{
background:#13233a;
padding:20px;
border-radius:12px;
}

input,select{
background:#0f1b2d;
border:1px solid #2d4469;
color:white;
padding:6px;
border-radius:6px;
}

button{
background:#2b4c7e;
color:white;
border:none;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#3d66a3;
}

.tag{
padding:6px 10px;
border-radius:20px;
display:inline-block;
margin:3px;
cursor:pointer;
}

.level1{background:#7ecf9a;color:#000;}
.level2{background:#f1d277;color:#000;}
.level3{background:#ef8a8a;color:#000;}

.questionCard{
border:2px solid #3e8c7a;
border-radius:12px;
padding:12px;
margin-top:10px;
display:flex;
align-items:center;
justify-content:space-between;
}

.questionInfo{
display:flex;
flex-direction:column;
}

.questionControls{
display:flex;
align-items:center;
gap:12px;
}

.partsList{
margin-top:10px;
font-size:14px;
}

.partRow{
display:flex;
align-items:center;
gap:8px;
margin-top:6px;
}

.subRow{
margin-left:20px;
display:flex;
gap:8px;
}

.editor{
min-height:300px;
border:1px solid #2d4469;
padding:10px;
border-radius:10px;
}

.previewRow{
display:flex;
}

.cell{
width:26px;
height:26px;
display:flex;
align-items:center;
justify-content:center;
border:1px solid #253a5c;
font-size:12px;
}

.thick{
border-right:3px solid white;
}

.dashed{
border-right:2px dashed #bbb;
}

</style>
</head>

<body>

<div class="container">

<div class="panel">

<h2>Paper setup</h2>

<input id="paperTitle" placeholder="Paper title" style="width:70%">
<input id="paperMarks" type="number" placeholder="Total marks" style="width:120px">

<hr>

<h3>Add a question</h3>

Q#
<input id="qNum" type="number" style="width:60px">

# of marks
<input id="qMarks" type="number" style="width:80px">

Brief description
<input id="qDesc" style="width:220px">

<br><br>

<label>
<input type="checkbox" id="noParts">
This question does not have parts
</label>

<div id="structureBuilder">

<div class="partRow">

<select id="partLetter">
<option>(a)</option>
<option>(b)</option>
<option>(c)</option>
<option>(d)</option>
<option>(e)</option>
<option>(f)</option>
<option>(g)</option>
<option>(h)</option>
</select>

<select id="partMarks">
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
<option>6</option>
<option>7</option>
<option>8</option>
<option>9</option>
<option>10</option>
</select>

<label>
<input type="checkbox" id="hasSubparts">
This part is broken into subparts
</label>

<button onclick="addDraftPart()">Add this part</button>

</div>

</div>

<div id="draftParts" class="partsList"></div>

<br>

<button onclick="addQuestion()">Add question</button>

<hr>

<div id="questions"></div>

</div>

<div class="panel">

<h2>Editor</h2>

<div id="editor" class="editor"></div>

</div>

</div>

<script>

let questions=[]
let draftParts=[]
let editingIndex=null
let tags=[]

function addDraftPart(){

let letter=document.getElementById("partLetter").value
let marks=parseInt(document.getElementById("partMarks").value)
let hasSub=document.getElementById("hasSubparts").checked

draftParts.push({
letter,
marks,
subparts:hasSub?[]:null
})

renderDraftParts()

}

function renderDraftParts(){

let box=document.getElementById("draftParts")
box.innerHTML=""

draftParts.forEach((p,i)=>{

let div=document.createElement("div")
div.className="partRow"

div.innerHTML=`
${p.letter} (${p.marks} marks)

<button onclick="editPart(${i})">Edit</button>
<button onclick="deletePart(${i})">Remove</button>
`

box.appendChild(div)

})

}

function deletePart(i){

draftParts.splice(i,1)
renderDraftParts()

}

function editPart(i){

let p=draftParts[i]

document.getElementById("partLetter").value=p.letter
document.getElementById("partMarks").value=p.marks

draftParts.splice(i,1)

renderDraftParts()

}

function addQuestion(){

let qNum=document.getElementById("qNum").value
let marks=parseInt(document.getElementById("qMarks").value)
let desc=document.getElementById("qDesc").value

let noParts=document.getElementById("noParts").checked

let structure=[]

if(noParts){

structure.push({
marks,
divider:"thick"
})

}else{

draftParts.forEach(p=>{
structure.push({
marks:p.marks,
divider:"thick"
})
})

}

questions.push({
qNum,
marks,
desc,
structure,
common:false,
tags:[]
})

draftParts=[]
renderDraftParts()

renderQuestions()

}

function renderQuestions(){

let box=document.getElementById("questions")
box.innerHTML=""

questions.forEach((q,i)=>{

let div=document.createElement("div")
div.className="questionCard"

let info=document.createElement("div")
info.className="questionInfo"

info.innerHTML=`
<b>Q${q.qNum} — ${q.desc}</b>
${q.tags.length} tagged / ${q.marks} total
`

let controls=document.createElement("div")
controls.className="questionControls"

let checkbox=document.createElement("input")
checkbox.type="checkbox"
checkbox.checked=q.common
checkbox.onchange=()=>{q.common=checkbox.checked}

let label=document.createElement("label")
label.innerText="Highlight as common question"

let editBtn=document.createElement("button")
editBtn.innerText="Edit"
editBtn.onclick=()=>editQuestion(i)

controls.appendChild(checkbox)
controls.appendChild(label)
controls.appendChild(editBtn)

div.appendChild(info)
div.appendChild(controls)

box.appendChild(div)

})

}

function editQuestion(i){

editingIndex=i
tags=[]
renderEditor()

}

function renderEditor(){

let editor=document.getElementById("editor")
editor.innerHTML=""

if(editingIndex===null)return

let q=questions[editingIndex]

let row=document.createElement("div")
row.className="previewRow"

let markCount=0

q.structure.forEach(seg=>{

for(let i=0;i<seg.marks;i++){

let cell=document.createElement("div")
cell.className="cell"
cell.innerText=""

cell.onclick=()=>tagCell(markCount)

row.appendChild(cell)

markCount++

}

row.lastChild.classList.add(seg.divider)

})

editor.appendChild(row)

renderTags()

}

function renderTags(){

let editor=document.getElementById("editor")

let tagRow=document.createElement("div")

tagRow.innerHTML=`
<span class="tag level1" onclick="tag('S1')">S1</span>
<span class="tag level2" onclick="tag('S2')">S2</span>
<span class="tag level3" onclick="tag('S3')">S3</span>
<span class="tag level1" onclick="tag('U1')">U1</span>
<span class="tag level2" onclick="tag('U2')">U2</span>
<span class="tag level3" onclick="tag('U3')">U3</span>
<span class="tag level1" onclick="tag('I1')">I1</span>
<span class="tag level2" onclick="tag('I2')">I2</span>
<span class="tag level3" onclick="tag('I3')">I3</span>
`

editor.appendChild(tagRow)

}

function tag(label){

tags.push(label)

}

function tagCell(i){

let q=questions[editingIndex]

if(tags.length===0)return

q.tags[i]=tags[tags.length-1]

renderEditor()

}

</script>

</body>
</html>
